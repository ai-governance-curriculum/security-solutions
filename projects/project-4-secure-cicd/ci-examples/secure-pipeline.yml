# Copy to .github/workflows/secure-pipeline.yml in your repo.
name: secure-pipeline
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # SAST
      - uses: github/codeql-action/init@v3
      - uses: github/codeql-action/analyze@v3

      # Dependency scan
      - uses: trufflesecurity/trufflehog@main
        with: { extra_args: --only-verified }

      # Build + push
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/app:${{ github.sha }}

      # SBOM
      - uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/app:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      # Vuln scan (fail on HIGH/CRITICAL)
      - uses: anchore/scan-action@v3
        with:
          image: ghcr.io/${{ github.repository }}/app:${{ github.sha }}
          fail-build: true
          severity-cutoff: high

      # Sign + attest
      - uses: sigstore/cosign-installer@v3
      - env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          IMG: ghcr.io/${{ github.repository }}/app
        run: |
          cosign sign --yes "${IMG}@${DIGEST}"
          cosign attest --yes --type cyclonedx --predicate sbom.cdx.json "${IMG}@${DIGEST}"
